<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF8F3"/>
      <stop offset="1" stop-color="#F3E7DD"/>
    </linearGradient>
    <linearGradient id="ico" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#C77A4E"/>
      <stop offset="1" stop-color="#A9502E"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#page)"/>

  <!-- brand cluster -->
  <g transform="translate(420,80)">
    <!-- app icon (1024-space art scaled to 116px) -->
    <g transform="scale(0.11328)">
      <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#ico)"/>
      <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#sheen)"/>
      <g transform="translate(512,512) scale(25) translate(-12,-12)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </g>
    </g>
    <text x="150" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#221D18">Cantoral</text>
    <text x="153" y="96" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#6B6155">Música de la iglesia</text>
  </g>

  <!-- tagline -->
  <text x="640" y="272" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" fill="#4b4238">Organiza, cataloga y reproduce la música de tu congregación.</text>

  <!-- meta chips -->
  <text x="640" y="312" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#A9502E">MACOS &#160;·&#160; WINDOWS &#160;·&#160; 100% LOCAL &#160;·&#160; OPEN SOURCE</text>
</svg>
